<!DOCTYPE html>
{% extends "base.html" %}
{% load staticfiles %}
<head>
{% block title %}Category{% endblock %}
{% block stylesheet %}
<link rel="stylesheet" type="text/css" href="{% static "css/category_list.css" %}">
{% endblock %}
</head>
<body>
{% block content %}
	<div class="categorylist">
		{% for post in posts %}
			<a href={{ post.get_absolute_url }} class="posttitle">{{ post.title }}</a>
		{% endfor %}
	</div>
{% endblock %}
</body>
