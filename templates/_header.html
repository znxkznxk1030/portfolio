<div class="nav">
    <div class="logo-menu">
        <h2 id="btn-nav">></h2>
    </div>
</div>
<div id="sidebar" class="sidenav open-nav">
	{% if categories %}	
	{% for category in categories %}
	<div class="dropdown" onmouseover="openPosts({{ category.title }})"
				onmouseout="closePosts({{ category.title }})">
		<h2 class="dropbtn">
			<a href="{{ category.get_absolute_url }}" 
			{% if seleted_category_slug == category.slug %}
			style="background-color:powderblue;"
			{% endif %}
			>
				 {{ category.title }} </a>
		</h2>
		<div class="dropdown-content" id="{{ category.title }}">
			{% for post in category.posts.all %}
				<h4>{{ post.title }} </h4>
			{% endfor %}
		</div>
	</div>
	{% endfor %}
	{% endif %}
</div>
