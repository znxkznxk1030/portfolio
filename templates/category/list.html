<!DOCTYPE html>
{% extends "base.html" %}
{% load staticfiles %}
<head>
{% block title %}Category{% endblock %}
{% block stylesheet %}
	<link rel="stylesheet" type="text/css" href="{% static "css/category_list.css" %}">{% endblock %}
</head>
<body>
{% block content %}
	<div class="categorylist">
		{% for post in posts %}
			<p class="posttitle">{{ post.title }}</p>
		{% endfor %}
	</div>
{% endblock %}
</body>
